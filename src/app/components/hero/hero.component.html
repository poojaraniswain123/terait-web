<section id="home"
    class="relative bg-[#040814] text-white min-h-[90vh] flex items-center justify-center overflow-hidden z-10 pt-20">

    <video autoplay loop playsinline [muted]="true"
        class="absolute inset-0 w-full h-full object-cover z-0 opacity-40 pointer-events-none">
        <source src="/coding.mp4" type="video/mp4">
    </video>

    <div
        class="absolute inset-0 z-[1] bg-gradient-to-b from-[#040814]/70 via-[#040814]/60 to-[#040814] pointer-events-none">
    </div>

    <div class="absolute inset-0 z-[2] opacity-20 pointer-events-none"
        style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 40px 40px;">
    </div>

    <div
        class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-terait-red opacity-[0.25] blur-[120px] rounded-full mix-blend-screen pointer-events-none animate-pulse z-[2]">
    </div>
    <div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-blue-600 opacity-[0.15] blur-[150px] rounded-full mix-blend-screen pointer-events-none animate-pulse z-[2]"
        style="animation-delay: 2s;"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full pb-24 md:pb-32">
        <div class="text-center max-w-5xl mx-auto">

            <div data-aos="fade-down" data-aos-duration="1000"
                class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-white/[0.03] border border-white/10 backdrop-blur-md mb-10 shadow-xl">
                <div class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-terait-red opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-terait-red"></span>
                </div>
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-gray-300">Next-Gen IT
                    Infrastructure</span>
            </div>

            <h1 data-aos="zoom-in" data-aos-delay="200" data-aos-duration="1000"
                class="text-6xl md:text-7xl lg:text-8xl font-black tracking-tighter mb-8 leading-[1.1]">
                <span class="block text-white drop-shadow-lg">Secure. Smart.</span>
                <span
                    class="block text-transparent bg-clip-text bg-gradient-to-r from-terait-red via-red-500 to-orange-500 mt-2 pb-2">Scalable.</span>
            </h1>

            <p data-aos="fade-up" data-aos-delay="400" data-aos-duration="1000"
                class="mt-6 text-xl md:text-2xl text-gray-300 leading-relaxed max-w-3xl mx-auto font-medium drop-shadow-md">
                Enterprise networking, surveillance, and managed cloud solutions delivered by industry veterans.
            </p>

            <div data-aos="fade-up" data-aos-delay="600" data-aos-duration="1000"
                class="mt-12 flex flex-col sm:flex-row justify-center gap-6">
                <button
                    class="relative overflow-hidden group bg-gradient-to-r from-terait-red to-orange-600 text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all duration-300 shadow-[0_0_30px_rgba(229,62,62,0.3)] hover:shadow-[0_0_40px_rgba(229,62,62,0.6)] hover:-translate-y-1">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        Explore Solutions
                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </span>
                    <div
                        class="absolute inset-0 h-full w-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]">
                    </div>
                </button>
                <button
                    class="bg-white/[0.05] border border-gray-500 hover:border-white hover:bg-white/10 backdrop-blur-sm text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all duration-300 hover:-translate-y-1 shadow-lg">
                    Contact Sales
                </button>
            </div>

        </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none z-20 pointer-events-none">
        <svg class="relative block w-full h-[60px] md:h-[80px]" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M1200 120L0 16.48 0 0 1200 0 1200 120z" class="fill-slate-50"></path>
        </svg>
    </div>
</section>
